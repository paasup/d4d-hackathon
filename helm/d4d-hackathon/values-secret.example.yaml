# 템플릿입니다. 복사해서 실제 값을 채운 뒤 -f로 넘기세요 (커밋 금지, .gitignore에 등록되어 있음):
#
#   cp helm/d4d-hackathon/values-secret.example.yaml helm/d4d-hackathon/values-secret.yaml
#   # API_KEY 값을 채운 뒤
#   helm upgrade --install d4d-hackathon helm/d4d-hackathon \
#     --namespace d4d-hackathon --create-namespace \
#     -f helm/d4d-hackathon/values-secret.yaml
#
# API_KEY가 없어도 central-backend는 정상 동작합니다 (chat_engine이 규칙 기반 응답으로 폴백).
centralBackend:
  apiKey: "sk-REPLACE_ME"
