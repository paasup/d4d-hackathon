<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>중앙 지휘 플랫폼 (COP Dashboard)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css?v=5" />
</head>
<body>

<header>
  <h1>중앙 지휘 플랫폼 (COP Dashboard)</h1>
  <span id="conn-status" class="badge badge-connecting">연결 중...</span>
  <div class="header-actions">
    <button id="restart-sim-btn" class="cmd-btn cmd-btn-compact">시뮬레이터 재시작</button>
  </div>
</header>

<section id="stats-bar">
  <button class="stat-card" data-filter="all">
    <span class="stat-value" id="stat-total">0</span>
    <span class="stat-label">전체 에지 수</span>
  </button>
  <button class="stat-card stat-card-alert" data-filter="alert">
    <span class="stat-value" id="stat-alert">0</span>
    <span class="stat-label">경보 상태 수</span>
  </button>
  <button class="stat-card stat-card-silent" data-filter="silent">
    <span class="stat-value" id="stat-silent">0</span>
    <span class="stat-label">무선침묵 수</span>
  </button>
  <button class="stat-card stat-card-heightened" data-filter="heightened">
    <span class="stat-value" id="stat-heightened">0</span>
    <span class="stat-label">경계태세 수</span>
  </button>
</section>

<main>
  <section id="map-panel">
    <div id="map"></div>
    <button id="chat-toggle-btn" class="map-overlay-btn">🗨 전술 AI 프롬프트</button>
    <div id="chat-modal" class="map-modal map-modal-transparent hidden">
      <div class="map-modal-content">
        <div class="map-modal-header">
          <span>전술 AI 프롬프트</span>
          <div class="map-modal-header-actions">
            <button id="chat-fullscreen-btn" class="map-modal-icon-btn" aria-label="전체화면">⛶</button>
            <button id="chat-modal-close" class="map-modal-close" aria-label="닫기">✕</button>
          </div>
        </div>
        <div id="chat-history"></div>
        <form id="chat-form">
          <input id="chat-input" type="text" placeholder="지금 가장 위험한 에지 COP는 어디고 매뉴얼상 대응책은 뭐야?" autocomplete="off" />
          <button type="submit">전송</button>
        </form>
      </div>
    </div>

    <aside id="side-panel" class="map-modal map-modal-right map-modal-transparent">
      <div class="map-modal-content">
        <h2>에지COP 상세 정보</h2>
        <div id="edge-empty" class="muted">지도에서 에지 핀을 클릭하세요.</div>
        <div id="edge-detail" class="hidden">
          <details class="detail-group" open>
            <summary>기본 정보</summary>
            <div class="detail-row"><span class="label">에지 ID</span><span id="d-id"></span></div>
            <div class="detail-row"><span class="label">좌표</span><span id="d-coords"></span></div>
            <div class="detail-row"><span class="label">상태</span><span id="d-status"></span></div>
            <div id="d-alert" class="alert-banner classification-badge hidden"></div>
          </details>
          <details class="detail-group" open>
            <summary>군수 상태</summary>
            <div class="detail-row"><span class="label">잔여 탄약</span><span id="d-ammo"></span></div>
            <div class="progress"><div id="d-ammo-bar" class="progress-bar"></div></div>
          </details>
          <details class="detail-group" open>
            <summary>작전 태세</summary>
            <div class="detail-row"><span class="label">무선 상태</span><span id="d-posture"></span></div>
            <div class="detail-row"><span class="label">다음 상태 갱신</span><span id="d-posture-countdown" class="muted"></span></div>
            <div class="detail-row"><span class="label">경계 태세</span><span id="d-alert-level"></span></div>
          </details>

          <div class="command-buttons">
            <div class="command-group-label">보급 절차</div>
            <div class="command-row">
              <button id="d-recon-btn" class="cmd-btn cmd-btn-lg">정찰 드론 투입</button>
              <button id="d-resupply-btn" class="cmd-btn cmd-btn-lg">보급 실행</button>
            </div>
            <div id="d-recon-status" class="recon-status hidden"></div>
            <button id="d-detour-btn" class="cmd-btn cmd-btn-warn hidden">우회로 정찰 실행</button>

            <div class="command-group-label">태세 전환</div>
            <div class="command-row">
              <button id="d-posture-btn" class="cmd-btn cmd-btn-lg">무선 침묵 전환</button>
              <button id="d-alertlevel-btn" class="cmd-btn cmd-btn-lg">경계태세 격상</button>
            </div>
          </div>
          <div id="d-command-result"></div>
        </div>
      </div>
    </aside>
  </section>
</main>

<section id="alerts-panel">
  <h2>최근 알림</h2>
  <div id="alerts-list" class="muted">알림 없음</div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js?v=5"></script>
</body>
</html>
